<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 200px;
        padding: 16px;
        font-family:
          ui-sans-serif,
          -apple-system,
          system-ui,
          'Segoe UI',
          Helvetica,
          'Apple Color Emoji',
          Arial,
          sans-serif,
          'Segoe UI Emoji',
          'Segoe UI Symbol';
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-color: #000000;
        color: #ececec;
        margin: 0;
      }
      button {
        padding: 12px 14px;
        cursor: pointer;
        background-color: #212121;
        color: #ececec;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        transition: background-color 0.2s;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 400;
      }
      button:hover {
        background-color: #2f2f2f;
      }
      h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        text-align: left;
        color: #fff;
        font-weight: 500;
        padding-left: 4px;
      }
    </style>
  </head>
  <body>
    <h3>ChatGPT</h3>
    <button id="btn-sidepanel">
      <span>Open in Side Panel</span>
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="15" y1="3" x2="15" y2="21"></line>
      </svg>
    </button>
    <button id="btn-popup">
      <span>Open in PopUp</span>
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
        <line x1="4" y1="8" x2="20" y2="8"></line>
      </svg>
    </button>
    <button id="btn-tab">
      <span>Open in New Tab</span>
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        <polyline points="15 3 21 3 21 9"></polyline>
        <line x1="10" y1="14" x2="21" y2="3"></line>
      </svg>
    </button>
    <script src="popup.js"></script>
  </body>
</html>
