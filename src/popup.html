<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 16px;
      font-family: ui-sans-serif, -apple-system, system-ui, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: #000000;
      color: #ececec;
      margin: 0;
    }
    button {
      padding: 12px 14px;
      cursor: pointer;
      background-color: #212121;
      color: #ececec;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      transition: background-color 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      font-weight: 400;
    }
    button:hover {
      background-color: #2f2f2f;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      text-align: left;
      color: #fff;
      font-weight: 500;
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <h3>ChatGPT</h3>
  <button id="btn-sidepanel">Open in Side Panel</button>
  <button id="btn-popup">Open in Window</button>
  <button id="btn-tab">Open in New Tab</button>
  <script src="popup.js"></script>
</body>
</html>
