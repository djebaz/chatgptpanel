name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Format Check
        run: npm run format

      - name: Run Lint
        if: success() || failure()
        run: npm run lint

      - name: Run Unit Tests
        if: success() || failure()
        run: |
          set -o pipefail
          # Force TAP reporter for stable parsing
          NODE_TEST_REPORTER=tap npm run test:unit 2>&1 | tee test-results.txt

      - name: Run E2E Tests
        if: success() || failure()
        run: |
          set -o pipefail
          xvfb-run npm run test:e2e 2>&1 | tee -a test-results.txt

      - name: Add summary to Job Summary
        if: always()
        run: |
          echo "### 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results.txt ]; then
            # Parse Unit Tests (TAP or Spec)
            UNIT_PASS=$(grep -E "[#ℹ] pass" test-results.txt | tail -1 | awk '{print $3}' | tr -d '\r' || echo "0")
            UNIT_FAIL=$(grep -E "[#ℹ] fail" test-results.txt | tail -1 | awk '{print $3}' | tr -d '\r' || echo "0")
            UNIT_PASS=${UNIT_PASS:-0}
            UNIT_FAIL=${UNIT_FAIL:-0}

            # Parse E2E Tests (Playwright)
            E2E_PASS=$(grep -E "[0-9]+ passed" test-results.txt | tail -1 | awk '{print $1}' | tr -d '\r' || echo "0")
            E2E_FAIL=$(grep -E "[0-9]+ failed" test-results.txt | tail -1 | awk '{print $1}' | tr -d '\r' || echo "0")
            E2E_PASS=${E2E_PASS:-0}
            E2E_FAIL=${E2E_FAIL:-0}

            echo "| Test Suite | Passed | Failed | Status |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :---: | :---: | :---: |" >> $GITHUB_STEP_SUMMARY

            if [ "$UNIT_FAIL" -eq "0" ] && [ "$UNIT_PASS" -gt "0" ]; then
              echo "| Unit Tests | $UNIT_PASS | $UNIT_FAIL | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Unit Tests | $UNIT_PASS | $UNIT_FAIL | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi

            if [ "$E2E_FAIL" -eq "0" ] && [ "$E2E_PASS" -gt "0" ]; then
              echo "| E2E Tests | $E2E_PASS | $E2E_FAIL | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| E2E Tests | $E2E_PASS | $E2E_FAIL | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ No test-results.txt found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Build Artifacts Summary" >> $GITHUB_STEP_SUMMARY
          echo "Files generated in 'src/':" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          ls -R src/ | head -n 50 >> $GITHUB_STEP_SUMMARY || echo "No files found." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "<details><summary>Expand detailed test summary</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.txt ]; then
            tail -n 100 test-results.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
