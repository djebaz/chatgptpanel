name: Release Signal Autoofix

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base ref (SHA or branch) for release signal evaluation'
        required: true
        default: 'main'
      head_ref:
        description: 'Head ref (SHA or branch) for release signal evaluation'
        required: true
        default: 'HEAD'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_SIGNAL_PUSH_TOKEN || github.token }}

      - name: Checkout manual ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_SIGNAL_PUSH_TOKEN || github.token }}

      - name: Resolve release-signal refs
        id: refs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "pr_title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
            echo "can_push=${{ github.event.pull_request.head.repo.full_name == github.repository }}" >> "$GITHUB_OUTPUT"
            echo "can_trigger_followup_checks=${{ secrets.RELEASE_SIGNAL_PUSH_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=${{ inputs.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ inputs.head_ref }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "pr_title=" >> "$GITHUB_OUTPUT"
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "can_trigger_followup_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate release signal before auto-fix
        id: release_signal_initial
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/check-release-signal-ci.ps1 \
            -BaseRef "${{ steps.refs.outputs.base_ref }}" \
            -HeadRef "${{ steps.refs.outputs.head_ref }}" \
            | tee release-signal-initial-log.txt
          initial_exit=${PIPESTATUS[0]}
          echo "exit_code=$initial_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Auto-fix unreleased release audit
        id: autofix
        if: github.event_name == 'pull_request' && steps.refs.outputs.can_push == 'true'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $path = 'devdocs/releases/unreleased.md'
          $prNumber = [int]'${{ steps.refs.outputs.pr_number }}'
          $prToken = "#$prNumber"
          $prTitle = @'
          ${{ steps.refs.outputs.pr_title }}
          '@.Trim()

          function Get-ReleaseAuditFooter {
            param(
              [Parameter(Mandatory = $true)]
              [AllowEmptyString()]
              [string] $Text
            )

            $pattern = '(?s)^(?<prefix>.*?)(?:\r?\n)?## Release audit\r?\n\r?\n- PRs:\s*(?<prs>[^\r\n]*)\r?\n- Scope:\s*(?<scope>[^\r\n]*)'
            $match = [regex]::Match($Text, $pattern)
            if (-not $match.Success) {
              return $null
            }

            return @{
              Prefix = $match.Groups['prefix'].Value.TrimEnd()
              PrLine = $match.Groups['prs'].Value.Trim()
              ScopeLine = $match.Groups['scope'].Value.Trim()
              PrTokens = @([regex]::Matches($match.Groups['prs'].Value, '#\d+') | ForEach-Object { $_.Value }) | Sort-Object -Unique
            }
          }

          function Get-SanitizedScopeSuffix {
            param(
              [AllowEmptyString()]
              [string] $Text
            )

            $clean = ($Text -replace '^(fix|feat|docs|chore|build|ci|test|refactor|perf)[:\-]', '')
            $clean = ($clean -replace '[^a-zA-Z0-9]', ' ').Trim()
            while ($clean -match '  ') {
              $clean = $clean -replace '  ', ' '
            }
            return $clean
          }

          if (-not (Test-Path -LiteralPath $path)) {
            Write-Host "release_audit_changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "::warning title=Release audit auto-fix skipped::$path does not exist."
            exit 0
          }

          $text = Get-Content -Raw -LiteralPath $path
          $footer = Get-ReleaseAuditFooter -Text $text
          if (-not $footer) {
            Write-Host "release_audit_changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "::warning title=Release audit auto-fix skipped::$path does not have a parseable Release audit footer."
            exit 0
          }

          $baseText = ''
          $baseFooter = $null
          try {
            $baseText = git show "${{ steps.refs.outputs.base_ref }}:$path"
            if ($LASTEXITCODE -eq 0 -and $baseText) {
              $baseFooter = Get-ReleaseAuditFooter -Text ($baseText -join "`n")
            }
          }
          catch {
            Write-Host "::warning title=Release audit base comparison failed::$($_.Exception.Message)"
          }

          $prAlreadyListed = @($footer.PrTokens) -contains $prToken
          $scopeAlreadyGrown = $false
          if ($baseFooter -and $footer.ScopeLine.Length -gt $baseFooter.ScopeLine.Length) {
            $scopeAlreadyGrown = $true
          }

          $changed = $false

          $cleanPrLine = $footer.PrLine.Trim().TrimEnd(',').Trim()
          if (-not $prAlreadyListed) {
            if ([string]::IsNullOrWhiteSpace($cleanPrLine)) {
              $newPrLine = $prToken
            }
            else {
              $newPrLine = "$cleanPrLine, $prToken"
            }
            $changed = $true
          }
          else {
            $newPrLine = $footer.PrLine
          }

          if (-not $scopeAlreadyGrown) {
            $branchName = git branch --show-current
            $scopeSuffix = Get-SanitizedScopeSuffix -Text $branchName
            if (-not $scopeSuffix) {
              $scopeSuffix = Get-SanitizedScopeSuffix -Text $prTitle
            }
            if (-not $scopeSuffix) {
              $scopeSuffix = "PR $prNumber"
            }

            $cleanScope = $footer.ScopeLine.Trim().TrimEnd(';').TrimEnd('.').Trim()
            if ([string]::IsNullOrWhiteSpace($cleanScope)) {
              $newScopeLine = $scopeSuffix
            }
            elseif ($cleanScope -notmatch [regex]::Escape($scopeSuffix)) {
              $newScopeLine = "$cleanScope; $scopeSuffix"
            }
            else {
              $newScopeLine = $footer.ScopeLine
            }

            if ($newScopeLine -ne $footer.ScopeLine) {
              $changed = $true
            }
          }
          else {
            $newScopeLine = $footer.ScopeLine
          }

          if (-not $changed) {
            "release_audit_changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release audit already up to date."
            exit 0
          }

          $newText = @(
            $footer.Prefix
            ''
            '## Release audit'
            ''
            "- PRs: $newPrLine"
            "- Scope: $newScopeLine"
          ) -join "`n"

          Set-Content -LiteralPath $path -Value $newText -Encoding UTF8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $path

          $diff = git diff --cached --name-only
          if (-not $diff) {
            "release_audit_changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "No staged release audit changes."
            exit 0
          }

          git commit -m "docs: sync release audit for $prToken"
          git push

          "release_audit_changed=true" >> $env:GITHUB_OUTPUT
          Write-Host "Auto-fixed $path for $prToken."

      - name: Evaluate release signal
        id: release_signal
        shell: bash
        run: |
          set -o pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/check-release-signal-ci.ps1 \
            -BaseRef "${{ steps.refs.outputs.base_ref }}" \
            -HeadRef HEAD \
            | tee release-signal-log.txt

      - name: Add release signal summary to Job Summary
        if: always()
        shell: bash
        run: |
          echo "### 🚀 Release Signal Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.autofix.outputs.release_audit_changed }}" = "true" ]; then
            if [ "${{ steps.refs.outputs.can_trigger_followup_checks }}" = "true" ]; then
              echo "> Auto-fix pushed an update to \`devdocs/releases/unreleased.md\` using \`RELEASE_SIGNAL_PUSH_TOKEN\`; normal PR checks should run again on the pushed commit." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "> Auto-fix pushed an update to \`devdocs/releases/unreleased.md\` using \`GITHUB_TOKEN\`. GitHub does not start a second workflow run from that token; this job re-ran release-signal validation locally instead." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "> No release-audit auto-fix was applied." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"

          RELEASE_LIKELY="${{ steps.release_signal.outputs.release_likely }}"
          if [ "$RELEASE_LIKELY" = "true" ]; then
            echo "| Release likely | ✅ \`true\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Release likely | ⚪ \`false\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          DOCS_REQUIRED="${{ steps.release_signal.outputs.docs_required }}"
          if [ "$DOCS_REQUIRED" = "true" ]; then
            echo "| Docs required | ⚠️ \`true\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Docs required | ✅ \`false\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          ERROR_COUNT="${{ steps.release_signal.outputs.error_count }}"
          if [ "$ERROR_COUNT" != "0" ] && [ -n "$ERROR_COUNT" ]; then
            echo "| Error count | ❌ \`$ERROR_COUNT\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Error count | ✅ \`0\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Initial release signal log</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f release-signal-initial-log.txt ]; then
            cat release-signal-initial-log.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No initial log found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Final release signal log</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f release-signal-log.txt ]; then
            cat release-signal-log.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No final log found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Sync release label from detection
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const explicitLabels = new Set(['release:needed', 'release:none']);
            const currentLabels = (context.payload.pull_request.labels || []).map(label => label.name);
            const hasExplicit = currentLabels.some(label => explicitLabels.has(label));
            const releaseLikely = `${{ steps.release_signal.outputs.release_likely }}`.toLowerCase() === 'true';
            const recommended = releaseLikely ? 'release:needed' : 'release:none';

            if (!hasExplicit) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [recommended],
              });
              core.info(`Explicit release label missing; auto-applied \`${recommended}\` from the release-signal result.`);
            }

      - name: Comment release-signal result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const releaseLikely = ${{ toJSON(steps.release_signal.outputs.release_likely) }};
            const docsRequired = ${{ toJSON(steps.release_signal.outputs.docs_required) }};
            const releaseReason = ${{ toJSON(steps.release_signal.outputs.release_reason) }};
            const warningsJoined = ${{ toJSON(steps.release_signal.outputs.warnings_joined) }};
            const errorsJoined = ${{ toJSON(steps.release_signal.outputs.errors_joined) }};
            const autoFixApplied = `${{ steps.autofix.outputs.release_audit_changed }}` === 'true';
            const followupChecksExpected = `${{ steps.refs.outputs.can_trigger_followup_checks }}` === 'true';
            const errorCount = `${{ steps.release_signal.outputs.error_count }}` || 'unknown';
            const recommendedLabel = releaseLikely === 'true' ? 'release:needed' : 'release:none';
            const failed = errorCount !== '0';
            const warningItems = warningsJoined ? warningsJoined.split(' || ').filter(Boolean) : [];
            const errorItems = errorsJoined ? errorsJoined.split(' || ').filter(Boolean) : [];
            const marker = '<!-- release-signal-comment -->';
            const actionsMetadataMarker = '<!-- release-signal-actions: ';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const alertType = failed ? '[!CAUTION]' : '[!TIP]';
            const statusEmoji = failed ? '❌' : '✔️';
            const statusText = failed ? 'FAIL' : 'PASS';
            const releaseEmoji = releaseLikely === 'true' ? '🔥' : '❄️';
            const docsEmoji = docsRequired === 'true' ? '📚' : '✅';
            const labelEmoji = recommendedLabel === 'release:needed' ? '🚀' : '🏷️';

            const lines = [
              marker,
              `> ${alertType}`,
              `> ### ${statusEmoji} ${statusText}`,
              '>',
              `> - **Release likely**: \`${releaseLikely || 'unknown'}\` ${releaseEmoji}`,
              `> - **Docs required**: \`${docsRequired || 'unknown'}\` ${docsEmoji}`,
              `> - **Recommended label**: \`${recommendedLabel}\` ${labelEmoji}`,
              `> - **Reason**: ${releaseReason || '(missing)'}`,
            ];

            if (errorItems.length) {
              lines.push('>', '> #### Errors');
              for (const item of errorItems) {
                lines.push(`> - ${item}`);
              }
            }

            if (warningItems.length) {
              lines.push('>', '> #### Warnings');
              for (const item of warningItems.slice(0, 3)) {
                lines.push(`> - ${item}`);
              }
            }

            const actions = [];
            if (autoFixApplied) {
              actions.push('Synced `devdocs/releases/unreleased.md` Release audit metadata 📜');
              if (followupChecksExpected) {
                actions.push('Auto-fix push used `RELEASE_SIGNAL_PUSH_TOKEN`; follow-up checks should rerun 🔁');
              } else {
                actions.push('Auto-fix push used `GITHUB_TOKEN`; GitHub suppresses recursive workflow runs, so release-signal was re-checked inside this job 🔁');
              }
            }

            actions.push(`Workflow run: ${runUrl}`);

            if (actions.length) {
              lines.push('>', '> #### ☑️ Auto-Applied Actions');
              for (const action of actions) {
                lines.push(`> - ${action}`);
              }
              lines.push(`${actionsMetadataMarker}${JSON.stringify(actions)} -->`);
            }

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing release-signal PR comment.');
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created release-signal PR comment.');
            }
